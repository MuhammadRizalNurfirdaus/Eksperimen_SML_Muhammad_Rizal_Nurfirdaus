name: MLflow CI Pipeline

on:
  push:
    paths:
      - 'Workflow-CI/MLProject/**'
  workflow_dispatch:

jobs:
  train_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install MLflow & dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow scikit-learn pandas numpy

    - name: Run MLflow tracking server (Port 5000)
      run: |
        mlflow server --host 127.0.0.1 --port 5000 --backend-store-uri sqlite:///mlflow_ci.db --default-artifact-root $GITHUB_WORKSPACE/mlruns &
        sleep 5 # Wait for server to start

    - name: Run MLflow Project
      run: |
        cd Workflow-CI/MLProject
        mlflow run . --env-manager local
      env:
        MLFLOW_TRACKING_URI: http://127.0.0.1:5000

    - name: Extract Run ID
      id: extract_run
      run: |
        RUN_ID=$(cat run_id.txt)
        echo "MLFLOW_RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Run ID extracted: $RUN_ID"

    - name: Build Docker Image using mlflow
      run: |
        mlflow models build-docker -m "runs:/${{ env.MLFLOW_RUN_ID }}/model" -n pubg_sentiment_model:latest
      env:
        MLFLOW_TRACKING_URI: http://127.0.0.1:5000

    - name: Upload MLruns Artifact
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: ./mlruns/
