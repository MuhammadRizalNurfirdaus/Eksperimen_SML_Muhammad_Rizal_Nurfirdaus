name: MLflow CI Pipeline

on:
  push:
    paths:
      - 'Workflow-CI/MLProject/**'
  workflow_dispatch:

jobs:
  train_and_build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install MLflow & dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow "scikit-learn>=1.3.0,<1.6.0" pandas numpy

    - name: Run MLflow tracking server
      run: |
        mlflow server \
          --host 127.0.0.1 \
          --port 5000 \
          --backend-store-uri sqlite:///mlflow_ci.db \
          --default-artifact-root $GITHUB_WORKSPACE/mlruns &
        sleep 5
        curl -s http://127.0.0.1:5000/health || echo "Server health check"

    - name: Run MLflow Project (Train Model)
      run: |
        cd Workflow-CI/MLProject
        python modelling.py
      env:
        MLFLOW_TRACKING_URI: http://127.0.0.1:5000

    - name: Extract Run ID
      id: extract_run
      run: |
        RUN_ID=$(cat Workflow-CI/MLProject/run_id.txt)
        echo "MLFLOW_RUN_ID=$RUN_ID" >> $GITHUB_ENV
        echo "Run ID extracted: $RUN_ID"

    - name: Upload MLflow Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mlflow-artifacts
        path: |
          ./mlruns/
          Workflow-CI/MLProject/run_id.txt

    - name: Build Docker Image using mlflow
      run: |
        mlflow models build-docker \
          -m "runs:/${{ env.MLFLOW_RUN_ID }}/model" \
          -n pubg_sentiment_model:latest
        echo "Docker image built successfully!"
        docker images | grep pubg_sentiment_model
      env:
        MLFLOW_TRACKING_URI: http://127.0.0.1:5000

    - name: Login to Docker Hub
      if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Tag and Push Docker Image to Docker Hub
      if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
      run: |
        docker tag pubg_sentiment_model:latest ${{ secrets.DOCKER_USERNAME }}/pubg_sentiment_model:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/pubg_sentiment_model:latest
        echo "Docker image pushed to: https://hub.docker.com/r/${{ secrets.DOCKER_USERNAME }}/pubg_sentiment_model"
