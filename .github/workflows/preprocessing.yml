name: Automated Preprocessing

on:
  push:
    branches: [main]
    paths:
      - 'pubg_mobile_reviews_raw/**'
      - 'preprocessing/automate_Muhammad_Rizal_Nurfirdaus.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run preprocessing
        run: |
          python preprocessing/automate_Muhammad_Rizal_Nurfirdaus.py

      - name: Commit and push preprocessed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubg_mobile_reviews_preprocessing/
          git diff --cached --quiet || git commit -m "chore: update preprocessed dataset [automated]"
          git push
